<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidResale Demo</title>
    <link rel="preload" href="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" as="image" type="image/png">
    <link rel="preload" href="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true" as="iframe" type="text/html">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            scroll-behavior: smooth;
        }

        .container {
            display: flex;
            flex-direction: column;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Scrollable Image with Lazy Loading -->
        <img id="landingPageImage" loading="lazy" src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Content div for seamless scrolling -->
        <div class="content" id="surveyContainer"></div>

    </div>

    <script>
        document.getElementById('landingPageImage').addEventListener('load', function() {
            var surveyIframe = document.createElement('iframe');
            surveyIframe.src = 'https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true';
            surveyIframe.loading = 'lazy';
            document.getElementById('surveyContainer').appendChild(surveyIframe);
            surveyIframe.style.visibility = 'visible';
        });
    </script>

</body>
</html>
