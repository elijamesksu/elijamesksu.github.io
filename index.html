<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
        }

        img {
            width: auto;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 0.5in; /* Adjust the gap as needed */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Scrollable Image -->
        <img src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Google Form survey iframe -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

        <!-- Photo Gallery -->
        <div style="display: flex; gap: 0.5in; margin-top: 0.5in;"> <!-- Adjust margin as needed -->
            <img src="https://drive.google.com/uc?id=1zPnFTthsWDWLn1NpYI5IJEn7LGc2-Jsk" alt="Gallery Image 1">
            <img src="https://drive.google.com/uc?id=1csoebT8-OOTEMQ03CEhgHnV4E3bz0FI4" alt="Gallery Image 2">
            <!-- Add more images as needed -->
        </div>

    </div>

</body>
</html>
