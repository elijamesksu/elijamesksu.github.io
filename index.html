<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidResale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            scroll-behavior: smooth; 
        }

        .container {
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            color: royalblue;
            display: none; /* Initially hide the loading text */
        }

        @keyframes rotateR {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        img {
            width: 100%;
            max-width: 100%; /* Make the image responsive */
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer; /* Add cursor pointer for clickable effect */
            position: relative; /* Add position relative for z-index to work */
            visibility: hidden; /* Initially hide the image */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
            visibility: hidden; /* Initially hide the iframe */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loading-text" id="loadingText">R</div>

        <!-- Scrollable Image with Lazy Loading -->
        <img id="landingPageImage" loading="lazy" src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Content div for seamless scrolling -->
        <div class="content" id="surveyContainer"></div>

    </div>

    <script>
        // Wait for the window and all content to be fully loaded
        window.addEventListener('load', function() {
            // Hide the loading text
            document.getElementById('loadingText').style.display = 'none';

            // Make the image and iframe visible
            document.getElementById('landingPageImage').style.visibility = 'visible';
            document.querySelector('iframe').style.visibility = 'visible';
        });

        // Add event listener to redirect to the survey when the image is clicked
        document.getElementById('landingPageImage').addEventListener('click', function() {
            window.location.href = 'https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform';
        });
    </script>

</body>
</html>
