<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Remove scrollbar from body */
        }

        .container {
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Enable scrolling for the container */
            height: 100vh; /* Set container height to full viewport height */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Scrollable Image with Lazy Loading -->
        <img loading="lazy" src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Google Form survey iframe with async attribute -->
        <iframe async loading="lazy" src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

    </div>

</body>
</html>
