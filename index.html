<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .gallery {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Click-through Gallery -->
        <div class="gallery">
            <img src="https://drive.google.com/uc?id=1zPnFTthsWDWLn1NpYI5IJEn7LGc2-Jsk" alt="Gallery Image 1" onclick="navigateGallery(1)">
            <img src="https://drive.google.com/uc?id=1csoebT8-OOTEMQ03CEhgHnV4E3bz0FI4" alt="Gallery Image 2" onclick="navigateGallery(2)">
            <!-- Add more images as needed -->
        </div>

        <!-- Google Form survey iframe -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

    </div>

    <script>
        let currentImageIndex = 0;
        const galleryImages = [
            "https://drive.google.com/uc?id=1zPnFTthsWDWLn1NpYI5IJEn7LGc2-Jsk",
            "https://drive.google.com/uc?id=1csoebT8-OOTEMQ03CEhgHnV4E3bz0FI4",
            // Add more image URLs as needed
        ];

        function navigateGallery(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) {
                currentImageIndex = galleryImages.length - 1;
            } else if (currentImageIndex >= galleryImages.length) {
                currentImageIndex = 0;
            }
            updateGallery();
        }

        function updateGallery() {
            const imageElement = document.querySelector('.gallery img');
            imageElement.src = galleryImages[currentImageIndex];
        }
    </script>

</body>
</html>
