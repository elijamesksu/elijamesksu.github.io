<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidResale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            scroll-behavior: smooth; 
        }

        .container {
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            color: royalblue;
            animation: rotateR 2s infinite linear; /* Rotate animation */
        }

        @keyframes rotateR {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            cursor: pointer; /* Add cursor pointer for clickable effect */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
            visibility: hidden; /* Hide the survey initially */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loading-text" id="loadingText">R</div>

        <!-- Scrollable Image with Lazy Loading -->
        <img id="landingPageImage" loading="lazy" src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Content div for seamless scrolling -->
        <div class="content" id="surveyContainer"></div>

    </div>

    <script>
        // Check if the element is in the viewport
        function isElementInViewport(el) {
            var rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Show/hide the loading text based on whether the image is in the viewport
        function toggleLoading() {
            var loadingText = document.getElementById('loadingText');
            var landingPageImage = document.getElementById('landingPageImage');

            if (isElementInViewport(landingPageImage)) {
                loadingText.style.display = 'none';
                window.removeEventListener('scroll', toggleLoading);
            } else {
                loadingText.style.display = 'block';
            }
        }

        // Check on page load and on scroll
        window.addEventListener('load', toggleLoading);
        window.addEventListener('scroll', toggleLoading);

        // Wait for the image to be fully loaded
        document.getElementById('landingPageImage').addEventListener('load', function() {
            // Create the survey iframe dynamically
            var surveyIframe = document.createElement('iframe');
            surveyIframe.src = 'https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true';
            surveyIframe.loading = 'lazy';

            // Append the survey iframe to the content div
            document.getElementById('surveyContainer').appendChild(surveyIframe);

            // Make the survey iframe visible
            surveyIframe.style.visibility = 'visible';
        });

        // Add event listener to redirect to the survey when the image is clicked
        document.getElementById('landingPageImage').addEventListener('click', function() {
            window.location.href = 'https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform';
        });
    </script>

</body>
</html>
