<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            min-height: 100vh;
        }

        figure {
            margin: 0;
            overflow-x: auto;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            max-height: 100vh; /* Limit the image height to the viewport height */
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            max-width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Scrollable Image -->
    <figure>
        <img src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">
        <figcaption>Landing Page</figcaption>
    </figure>

    <!-- Photo Gallery -->
    <div class="gallery">
        <img src="https://drive.google.com/uc?id=1N2P8TGQUkgqsnEPvFwEwYkXs60n4Pb2E" alt="Gallery Image 1">
        <!-- Add more gallery images as needed -->
    </div>

    <!-- Google Form survey iframe -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

</body>
</html>
