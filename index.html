<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
            visibility: hidden; /* Hide the survey initially */
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Scrollable Image -->
        <img id="landingPageImage" src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Google Form survey iframe -->
        <iframe id="surveyIframe" src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

    </div>

    <script>
        // Wait for the image to be fully loaded
        document.getElementById('landingPageImage').addEventListener('load', function() {
            // Make the survey iframe visible
            document.getElementById('surveyIframe').style.visibility = 'visible';
        });
    </script>

</body>
</html>
