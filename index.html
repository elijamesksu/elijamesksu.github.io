<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            max-width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Clickable Folder for Gallery -->
        <div class="folder" onclick="openGallery()">
            <img src="folder-icon.png" alt="Gallery Folder">
            <span>Click to open gallery</span>
        </div>

        <!-- Photo Gallery (Initially Hidden) -->
        <div class="gallery" id="photoGallery" style="display: none;">
            <img src="https://drive.google.com/uc?id=1zPnFTthsWDWLn1NpYI5IJEn7LGc2-Jsk" alt="Gallery Image 1">
            <img src="https://drive.google.com/uc?id=1csoebT8-OOTEMQ03CEhgHnV4E3bz0FI4" alt="Gallery Image 2">
            <!-- Add more images as needed -->
        </div>

        <!-- Google Form survey iframe -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

    </div>

    <script>
        function openGallery() {
            document.getElementById('photoGallery').style.display = 'flex';
        }
    </script>

</body>
</html>
