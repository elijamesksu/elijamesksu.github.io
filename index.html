<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Resale Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: auto;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%; /* Adjust the height of the container as needed */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            z-index: 1; /* Place the PNG behind the survey */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 800px; /* Adjust the height of the survey iframe as needed */
            border: 0;
            z-index: 2; /* Place the survey on top */
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Scrollable Image -->
        <img src="https://drive.google.com/uc?id=1NxjoaVHoCpdQd5R5rj_Nuo8q68SItYXK" alt="Landing Page">

        <!-- Google Form survey iframe -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeNYioyWXiUh3i1t7s8PwR92_wEvKADqUJCRxERVqX6mnreBA/viewform?embedded=true"></iframe>

    </div>

</body>
</html>
